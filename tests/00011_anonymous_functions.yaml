namespace test.lambdas;

typedef (int, int) => int BinaryOp;

class LambdasTest {
	public void run() {
		auto add = (int a, int b) => a + b;
		int r = add(5, 3);

		auto mul = (int a, int b) => int { return a * b; };
		int r2 = mul(2, 4);

		int factor = 10;
		auto scale = (int x) => x * factor;

		BinaryOp op = (int a, int b) => a - b;
		int r3 = op(10, 4);
	}
}

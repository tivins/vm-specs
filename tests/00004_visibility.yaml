# tests/00004_visibility.yaml

---
title: "Testing public, protected, private visibility"
expected_exit_code: 0
expected_stdout: ""
---

namespace test.visibility;

class Base {
	public string publicField;
	protected string protectedField;
	private string privateField;

	public void publicMethod() {
		this.publicField = "a";
		this.protectedField = "a";
		this.privateField = "a";
	}

	protected void protectedMethod() {
		this.publicField = "b";
		this.privateField = "b";
	}

	private void privateMethod() {
		this.publicField = "c";
	}
}

class Derived extends Base {
	public void testAccess() {
		this.publicField = "ok";
		this.protectedField = "ok";
	}
}

class VisibilityTest {
	public void run() {
		Base b = new Base();
		b.publicField = "ok";
		Derived d = new Derived();
		d.publicField = "ok";
		d.testAccess();
	}
}

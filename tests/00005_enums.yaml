namespace test.enums;

enum States {
	Waiting,
	Loading,
	Started,
	Finished,
}

enum Status: int {
	OK = 200,
	NotFound = 404,
	Error = 500,
}

class EnumsTest {
	public void run() {
		States s = States.Waiting;
		Status st = Status.OK;
		int code = st.value;
	}
}

namespace test.params;

class Box {
	private string name;
	private int count;

	public construct(string name, int count = 0) {
		this.name = name;
		this.count = count;
	}

	public static void doSomething(int a, string b, float c = 0.0, bool d = false) {
	}

	public self setName(string name) {
		this.name = name;
		return this;
	}

	public self setCount(int count) {
		this.count = count;
		return this;
	}
}

class NamedParamsTest {
	public void run() {
		Box.doSomething(1, "x");
		Box.doSomething(a: 1, b: "x", c: 1.0);
		Box.doSomething(1, b: "x");

		auto box = new Box("first")
			.setName("second")
			.setCount(10);

		auto box2 = new Box(name: "a", count: 5);
	}
}

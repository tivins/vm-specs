namespace test.readonly;

class readonly ValueObject {
	public int value;
	public construct(int value) {
		this.value = value;
	}
}

class ResultHolder {
	private int value;

	public construct(int value) {
		this.value = value;
	}

	public nodiscard int getValue() {
		return this.value;
	}
}

class ReadonlyTest {
	public void run() {
		ValueObject vo = new ValueObject(42);
		int v = vo.value;

		ResultHolder rh = new ResultHolder(10);
		int x = rh.getValue();
	}
}
